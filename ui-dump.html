<!DOCTYPE html>
<html lang="pt-BR"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UI Check</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    #status { padding: 12px 16px; white-space: pre-wrap; font-size: 14px; }
    iframe { width: 1440px; height: 2400px; border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div id="status">{
  "ok": false,
  "stage": "boot",
  "reason": "finance app not ready"
}</div>
  <iframe id="app" src="/index.html"></iframe>
  <script>
    const statusEl = document.getElementById('status');
    const frame = document.getElementById('app');

    const setStatus = (ok, details) => {
      statusEl.textContent = JSON.stringify({ ok, ...details }, null, 2);
    };

    frame.addEventListener('load', () => {
      const started = Date.now();
      const waitForApp = setInterval(() => {
        const w = frame.contentWindow;
        const d = frame.contentDocument;
        const cards = Array.from(d.querySelectorAll('.app-card'));
        const financeCard = cards.find((el) => /Financeiro/i.test(el.textContent || ''));
        if (!w || !d || typeof w.superApp === 'undefined' || typeof w.superApp.launchApp !== 'function' || !financeCard) {
          if (Date.now() - started > 8000) {
            clearInterval(waitForApp);
            setStatus(false, { stage: 'boot', reason: 'finance app not ready' });
          }
          return;
        }
        clearInterval(waitForApp);
        financeCard.click();

        const launchedAt = Date.now();
        const waitForFinance = setInterval(() => {
          const chips = Array.from(d.querySelectorAll('.finance-filter-chip'));
          const chipLabels = Array.from(d.querySelectorAll('.finance-filter-chip-label')).map((el) => (el.textContent || '').trim());
          const chipTitles = Array.from(d.querySelectorAll('.finance-filter-chip-title')).map((el) => (el.textContent || '').trim());
          const visibleText = (d.body && d.body.innerText) ? d.body.innerText : '';
          const hasExpectedLabels =
            chipLabels.length >= 3 &&
            chipLabels.every((label) => label === 'Ver só') &&
            chipTitles.includes('Despesas fixas') &&
            chipTitles.includes('Débito / pix') &&
            chipTitles.includes('Receitas');
          const hasMojibake = /?|Ă|Â/.test(visibleText);
          if (hasExpectedLabels || Date.now() - launchedAt > 12000) {
            clearInterval(waitForFinance);
            setStatus(hasExpectedLabels && !hasMojibake, {
              stage: 'finance',
              chipLabels,
              chipTitles,
              chips: chips.length,
              hasMojibake,
              sample: visibleText.slice(0, 240)
            });
          }
        }, 200);
      }, 100);
    });
  </script>


</body></html>
