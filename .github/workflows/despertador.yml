name: Notificacoes Gerais - Super App

on:
  schedule:
    # Executa no minuto 0 de cada hora.
    # Responsavel apenas pelos alertas gerais (calendario e saude).
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  enviar_notificacoes_gerais:
    runs-on: ubuntu-latest
    steps:
      - name: Chamando endpoint geral de notificacoes
        run: |
          curl --fail --show-error --silent -X POST "https://super-app-zeta-virid.vercel.app/api/notificar" \
          -H "Content-Type: application/json"
