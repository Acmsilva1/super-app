name: Analise do Sistema

on:
  schedule:
    # 3x por dia (UTC): 00:00, 08:00, 16:00
    # Em America/Sao_Paulo normalmente equivale a 21:00, 05:00, 13:00.
    - cron: "0 0,8,16 * * *"
  workflow_dispatch:

jobs:
  executar_analise:
    runs-on: ubuntu-latest
    steps:
      - name: Acordar analise no Vercel
        run: |
          curl --fail --show-error --silent -X POST "https://super-app-zeta-virid.vercel.app/api/system-analysis" \
          -H "Content-Type: application/json"
